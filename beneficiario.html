<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Estado — Distribución del Hogar</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    body { background: var(--bg); }

    /* ── Header ── */
    .page-header {
      background: var(--text-1);
      padding: 1rem 1.25rem 3rem;
      border-bottom: 3px solid var(--brand);
    }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .greeting h1 { font-size: 1.25rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    .greeting p  { font-size: 0.75rem; color: #666; margin-top: 3px; font-weight: 500; }

    /* ── Hero card flotante ── */
    .hero-card-wrap { padding: 0 1.25rem; margin-top: -2rem; margin-bottom: 1.25rem; }
    .hero-card {
      background: var(--surface);
      border-radius: var(--r-xl);
      padding: 1.25rem 1.5rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
    }
    .hc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.9rem; }
    .hc-tipo {
      display: inline-flex; align-items: center;
      background: var(--brand-light); color: var(--brand);
      font-size: 0.68rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em;
      border-radius: 99px; padding: 0.22rem 0.7rem;
    }
    .hc-mes { font-size: 0.75rem; color: var(--text-3); font-weight: 600; }
    .hc-amount-label { font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); margin-bottom: 0.2rem; }
    .hc-amount { font-size: 2.1rem; font-weight: 800; color: var(--text-1); letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }

    /* ── Progress ── */
    .progress-wrap { margin-top: 1rem; }
    .progress-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-3); margin-bottom: 0.35rem; font-weight: 500; }
    .progress-labels strong { color: var(--text-1); font-weight: 800; }
    .progress-track { background: var(--bg); border-radius: 99px; height: 7px; overflow: hidden; border: 1px solid var(--border); }
    .progress-fill  { height: 100%; border-radius: 99px; background: var(--brand); transition: width .5s ease; }

    /* ── Tabs ── */
    .tabs-outer { padding: 0 1.25rem 1.25rem; }

    /* ── Content ── */
    .container { padding: 0 1.25rem 2rem; }

    /* ── Eventos de pago ── */
    .pago-evento {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--border);
    }
    .pago-evento:last-child { border-bottom: none; }

    .pe-status {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0; font-weight: 800;
    }
    .pe-status.paid    { background: var(--income-bg); color: var(--income); }
    .pe-status.pending { background: var(--surface-2); color: var(--text-3); border: 1.5px dashed var(--border-2); }

    .pe-info { flex: 1; }
    .pe-fuente  { font-size: 0.88rem; font-weight: 700; color: var(--text-1); }
    .pe-detalle { font-size: 0.72rem; color: var(--text-3); margin-top: 2px; }

    .pe-monto { text-align: right; }
    .pe-monto .amount { font-size: 1rem; font-weight: 800; color: var(--text-1); font-variant-numeric: tabular-nums; }
    .pe-monto .status-label { font-size: 0.63rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-top: 2px; }
    .pe-monto .status-label.paid    { color: var(--income); }
    .pe-monto .status-label.pending { color: var(--text-3); }

    /* ── Resumen KPIs ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }

    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="header-top">
      <div class="greeting">
        <h1 id="greeting-name">Hola 👋</h1>
        <p id="greeting-mes">—</p>
      </div>
      <button class="btn-ghost" onclick="identity.clear()">Cambiar</button>
    </div>
  </div>

  <div class="hero-card-wrap">
    <div class="hero-card">
      <div class="hc-top">
        <span class="hc-tipo" id="hc-tipo">—</span>
        <span class="hc-mes" id="hc-mes">—</span>
      </div>
      <div class="hc-amount-label">Tu pago mensual</div>
      <div class="hc-amount" id="hc-amount">—</div>
      <div class="progress-wrap">
        <div class="progress-labels">
          <span>Recibido: <strong id="prog-recibido">$0</strong></span>
          <span>Total: <strong id="prog-total">—</strong></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="tabs-outer">
    <div class="tabs-wrap">
      <button class="tab-btn active" onclick="switchTab('estado', this)">💰 Mi Estado</button>
      <button class="tab-btn" onclick="switchTab('hogar', this)">🏠 Resumen del Hogar</button>
    </div>
  </div>

  <div class="container">

    <!-- TAB: MI ESTADO -->
    <div id="tab-estado" class="tab-view active">
      <div class="section">
        <div class="section-title">Pagos del mes</div>
        <div id="eventos-pago">Cargando…</div>
      </div>
    </div>

    <!-- TAB: RESUMEN DEL HOGAR -->
    <div id="tab-hogar" class="tab-view">
      <div class="kpi-grid">
        <div class="kpi ing">
          <div class="kpi-label">Total Ingresos</div>
          <div class="kpi-amount" id="kpi-ing">—</div>
        </div>
        <div class="kpi gas">
          <div class="kpi-label">Total Gastos</div>
          <div class="kpi-amount" id="kpi-gas">—</div>
        </div>
        <div class="kpi lib">
          <div class="kpi-label">Para Beneficiarios</div>
          <div class="kpi-amount" id="kpi-lib">—</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Ingresos</div>
        <table>
          <thead><tr><th>Fuente</th><th>Valor</th><th>Día</th></tr></thead>
          <tbody id="tbody-ingresos"></tbody>
        </table>
      </div>

      <div class="section">
        <div class="section-title">Gastos — Servicios</div>
        <table>
          <thead><tr><th>Concepto</th><th>Valor</th><th>Día</th></tr></thead>
          <tbody id="tbody-servicios"></tbody>
        </table>
      </div>

      <div class="section">
        <div class="section-title">Gastos — Otros</div>
        <table>
          <thead><tr><th>Concepto</th><th>Valor mensual</th></tr></thead>
          <tbody id="tbody-otros"></tbody>
        </table>
      </div>

      <div class="section">
        <div class="section-title">Distribución mensual</div>
        <table>
          <thead><tr><th>Fuente</th><th>Día</th><th>Total</th><th>Completa</th><th>Media</th></tr></thead>
          <tbody id="tbody-distribucion"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script type="module" src="assets/js/pages/beneficiario.js"></script>
</body>
</html>
