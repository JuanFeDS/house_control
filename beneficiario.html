<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Estado — Distribución del Hogar</title>
  <script>var _t=localStorage.getItem('hogar_theme');if(_t)document.documentElement.dataset.theme=_t;</script>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    body { background: var(--bg); }

    /* ── Header ── */
    .page-header {
      background: var(--header-bg);
      padding: 1.1rem 1.25rem 3.5rem;
      border-bottom: 3px solid var(--brand);
    }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .greeting h1 { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
    .greeting p  { font-size: 0.72rem; color: var(--header-sub); margin-top: 4px; font-weight: 500; font-family: var(--font-mono); letter-spacing: .02em; }

    /* ── Hero card flotante ── */
    .hero-card-wrap { padding: 0 1.25rem; margin-top: -2.5rem; margin-bottom: 1.25rem; }
    .hero-card {
      background: var(--surface);
      border-radius: var(--r-xl);
      padding: 1.4rem 1.6rem 1.25rem;
      box-shadow: var(--shadow);
    }
    .hc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.1rem; }
    .hc-tipo {
      display: inline-flex; align-items: center;
      background: var(--brand-light); color: var(--brand);
      font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      border-radius: 4px; padding: 0.22rem 0.65rem;
    }
    .hc-mes {
      font-size: 0.72rem; color: var(--text-3); font-weight: 500;
      font-family: var(--font-mono);
    }
    .hc-amount-label {
      font-size: 0.62rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--text-3); margin-bottom: 0.15rem;
    }
    .hc-amount {
      font-size: 3rem; font-weight: 700;
      color: var(--text-1); letter-spacing: -0.04em;
      font-family: var(--font-mono);
      line-height: 1;
    }

    /* ── Progress ── */
    .progress-wrap { margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .progress-labels {
      display: flex; justify-content: space-between;
      font-size: 0.68rem; color: var(--text-3);
      margin-bottom: 0.5rem; font-weight: 500;
    }
    .progress-labels strong { color: var(--text-1); font-weight: 700; font-family: var(--font-mono); }
    .progress-track {
      background: var(--bg); border-radius: 99px;
      height: 6px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: var(--brand);
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* ── Tabs ── */
    .tabs-outer { padding: 0 1.25rem; }

    /* ── Content ── */
    .container { padding: 0 1.25rem 2.5rem; }

    /* ── Eventos de pago ── */
    .pago-evento {
      display: flex; align-items: center; gap: 0.9rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }
    .pago-evento:last-child { border-bottom: none; }

    .pe-status {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; flex-shrink: 0; font-weight: 700;
    }
    .pe-status.paid    { background: var(--income-bg); color: var(--income); }
    .pe-status.pending { background: var(--surface-2); color: var(--text-3); border: 1.5px dashed var(--border-2); }

    .pe-info { flex: 1; }
    .pe-fuente  { font-size: 0.88rem; font-weight: 700; color: var(--text-1); }
    .pe-detalle { font-size: 0.7rem; color: var(--text-3); margin-top: 3px; }

    .pe-monto { text-align: right; }
    .pe-monto .amount {
      font-size: 1rem; font-weight: 700;
      color: var(--text-1);
      font-family: var(--font-mono);
    }
    .pe-monto .status-label {
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; margin-top: 3px;
    }
    .pe-monto .status-label.paid    { color: var(--income); }
    .pe-monto .status-label.pending { color: var(--text-3); }

  </style>
</head>
<body>

  <div class="page-header">
    <div class="header-top">
      <button class="btn-ghost" onclick="identity.clear()" style="padding:0.38rem 0.6rem" title="Inicio">🏠</button>
      <p id="greeting-mes" style="margin:0;font-size:0.82rem;color:var(--text-3);font-weight:600">—</p>
      <button class="btn-ghost" id="theme-btn" onclick="toggleTheme()" style="padding:0.38rem 0.6rem">☾</button>
    </div>
  </div>

  <div class="hero-card-wrap">
    <div class="hero-card">
      <div class="hc-top">
        <span class="hc-tipo" id="hc-tipo">—</span>
        <span class="hc-mes" id="hc-mes">—</span>
      </div>
      <div class="hc-amount-label">Tu pago mensual</div>
      <div class="hc-amount" id="hc-amount">—</div>
      <div class="progress-wrap">
        <div class="progress-labels">
          <span>Recibido: <strong id="prog-recibido">$0</strong></span>
          <span>Total: <strong id="prog-total">—</strong></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="tabs-outer">
    <div class="tabs-wrap">
      <button class="tab-btn active" onclick="switchTab('estado', this)">💰 Mi Estado</button>
      <button class="tab-btn" onclick="switchTab('hogar', this)">🏠 Resumen del Hogar</button>
    </div>
  </div>

  <div class="container">

    <!-- TAB: MI ESTADO -->
    <div id="tab-estado" class="tab-view active">
      <div class="section">
        <div class="section-title">Pagos del mes</div>
        <div id="eventos-pago">Cargando…</div>
      </div>
    </div>

    <!-- TAB: RESUMEN DEL HOGAR -->
    <div id="tab-hogar" class="tab-view">

      <div class="section">
        <div class="section-title">Resumen del mes</div>
        <div class="tbl-scroll">
          <table>
            <thead>
              <tr><th>Concepto</th><th>Total hogar</th><th>Tu parte</th></tr>
            </thead>
            <tbody id="tbody-resumen"></tbody>
          </table>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Ingresos</div>
        <div class="tbl-scroll">
          <table>
            <thead><tr><th>Fuente</th><th>Valor</th><th>Día</th></tr></thead>
            <tbody id="tbody-ingresos"></tbody>
          </table>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Gastos — Servicios</div>
        <div class="tbl-scroll">
          <table>
            <thead><tr><th>Concepto</th><th>Valor</th><th>Día</th></tr></thead>
            <tbody id="tbody-servicios"></tbody>
          </table>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Gastos — Otros</div>
        <div class="tbl-scroll">
          <table>
            <thead><tr><th>Concepto</th><th>Valor mensual</th></tr></thead>
            <tbody id="tbody-otros"></tbody>
          </table>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Pagos del mes</div>
        <div id="distribucion-eventos">Cargando…</div>
      </div>
    </div>

  </div>

  <script type="module" src="assets/js/pages/beneficiario.js"></script>
</body>
</html>
